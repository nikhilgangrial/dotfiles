# ── Prefix ─────────────────────────────────────────────────────────────────────
set -g prefix C-b

# ── Keybinds (M- = Alt on Linux / forwarded from Cmd on macOS via Ghostty) ────
# On Linux:  Alt+key  → terminal sends ESC+key → tmux sees M-key natively
# On macOS:  Cmd+key  → Ghostty remaps to ESC+key → tmux sees the same M-key
# Ctrl+Tab / Ctrl+Shift+Tab: Ghostty forwards as ESC+Tab / ESC+Shift-Tab

# Pane management
bind-key -n M-d split-window -h -c "#{pane_current_path}"
bind-key -n M-D split-window -v -c "#{pane_current_path}"
bind-key -n M-w kill-pane

# Navigate panes
bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U

# Windows (tabs)
bind-key -n M-t new-window -c "#{pane_current_path}"
bind-key -n M-T new-session

# Cycle windows (tabs)
bind-key -n M-n next-window
bind-key -n M-p previous-window

# Swap window left/right (follows the window to its new position)
bind-key -n M-H swap-window -t -1 \; select-window -t -1
bind-key -n M-L swap-window -t +1 \; select-window -t +1

# Cycle sessions (shift)
bind-key -n M-N switch-client -n
bind-key -n M-P switch-client -p

# Window quick-select (1-9, 0 = window 10)
bind-key -n M-1 select-window -t:=1
bind-key -n M-2 select-window -t:=2
bind-key -n M-3 select-window -t:=3
bind-key -n M-4 select-window -t:=4
bind-key -n M-5 select-window -t:=5
bind-key -n M-6 select-window -t:=6
bind-key -n M-7 select-window -t:=7
bind-key -n M-8 select-window -t:=8
bind-key -n M-9 select-window -t:=9
bind-key -n M-0 select-window -t:=10

# ── Session switcher ────────────────────────────────────────────────────────────
bind-key -n 'C-Space' run-shell 'sh ~/.config/tmux/scripts/ts.sh'

# ── Copy mode (vi) ──────────────────────────────────────────────────────────────
bind -n M-u copy-mode -e
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'q' send -X cancel
bind-key -T copy-mode-vi 'Escape' send -X cancel
bind-key -T copy-mode-vi M-u send -X cancel
